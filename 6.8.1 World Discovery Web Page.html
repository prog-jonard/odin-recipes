<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discover Your World</title>
    <!-- Task 1: Add the favicon link here -->
    <link rel="icon" type=image/png href="https://edube.org/uploads/media/default/0001/04/web-favicon.png"">
    <!-- Task 2: Add link to script here -->
    <script src="script.js"></script>
</head>
<body>
    <h1>&#x1F30D Discover Your World &#x1F30D<!-- Task 3: Add an emoji here --></h1>
    <p>Click the button to learn about the continent you're on and some famous geographical features.</p>
    <button id="getLocation">Discover Location</button>
    <!-- Task 4: Add a button for displaying geolocation information here -->

    <img src="https://edube.org/uploads/media/default/0001/04/continents.jpg" usemap="#image-map" alt="World Map">
    <map name="image-map">
        <!-- Task 5: Add area tags for continents here -->
            <area id="north-america" alt="North America" title="North America" shape="rect" coords="386,283,41,17">
            <area id="south-america" alt="South America" title="South America" shape="rect" coords="209,501,358,288">
            <area id="europe" alt="Europe" title="Europe" shape="rect" coords="391,68,505,217">
            <area id="africa" alt="Africa" title="Africa" shape="rect" coords="533,217,387,448">
            <area id="asia" alt="Asia" title="Asia" shape="rect" coords="893,153,506,1">
            <area id="australia-and-oceania" alt="Australia and Oceania" title="Australia and Oceania" shape="rect" coords="679,353,872,480">
        
    </map>
</body>
</html>
